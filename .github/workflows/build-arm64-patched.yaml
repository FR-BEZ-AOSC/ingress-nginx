name: Build Multi-Arch Patched Image

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: 'Image tag suffix (e.g. patched-cve-2026-42945-cve-2026-9256-atos)'
        required: true
        default: 'patched-cve-2026-42945-cve-2026-9256-atos'
      base_tag_prefix:
        description: 'Base tag prefix (e.g. maint-20260303-095526-ingress-nginx-005)'
        required: true
        default: 'maint-20260303-095526-ingress-nginx-005'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: atosopensource
  IMAGE_NAME: ingress-nginx
  FULL_TAG: ${{ inputs.base_tag_prefix }}-${{ inputs.tag_suffix }}

jobs:
  # ---- NGINX Base: build per-arch on native runners ----
  build-nginx-base-amd64:
    name: NGINX Base (amd64)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          cd images/nginx
          docker buildx build --platform linux/amd64 --network=host \
            --push \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-base-amd64 \
            rootfs/

  build-nginx-base-arm64:
    name: NGINX Base (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          cd images/nginx
          docker buildx build --platform linux/arm64 --network=host \
            --push \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-base-arm64 \
            rootfs/

  # ---- NGINX Base: create multi-arch manifest ----
  nginx-base-manifest:
    name: NGINX Base Manifest
    runs-on: ubuntu-latest
    needs: [build-nginx-base-amd64, build-nginx-base-arm64]
    steps:
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push base manifest
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-base \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-base-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-base-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-base

  # ---- Controller: build per-arch on native runners ----
  build-controller-amd64:
    name: Controller (amd64)
    runs-on: ubuntu-24.04
    needs: nginx-base-manifest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          docker buildx build --platform linux/amd64 --network=host \
            --build-arg BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-base-amd64 \
            --build-arg VERSION=${{ env.FULL_TAG }} \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            --push \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-amd64 \
            rootfs/

  build-controller-arm64:
    name: Controller (arm64)
    runs-on: ubuntu-24.04-arm
    needs: nginx-base-manifest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          docker buildx build --platform linux/arm64 --network=host \
            --build-arg BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-base-arm64 \
            --build-arg VERSION=${{ env.FULL_TAG }} \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            --push \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-arm64-ctrl \
            rootfs/

  # ---- Controller: create final multi-arch manifest ----
  controller-manifest:
    name: Final Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [build-controller-amd64, build-controller-arm64]
    steps:
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push controller manifest
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}-arm64-ctrl
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}

      - name: Inspect and summary
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}
          echo "## ✅ Multi-arch image pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FULL_TAG }} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
